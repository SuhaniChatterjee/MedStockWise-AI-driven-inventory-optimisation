project_id = "umnvrftxfxaunofkwbgh"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"
max_header_length = 4096

[studio]
enabled = true
port = 54324
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 54325
smtp_port = 54326
pop3_port = 54327

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# NOTE: these two only apply to `supabase start` (local dev) -- they are
# NOT pushed to a remote/hosted project by `db push` or `functions deploy`.
# For a hosted project, site_url/redirect URLs are a separate setting
# (Dashboard -> Authentication -> URL Configuration, or the Management API's
# `/v1/projects/{ref}/config/auth`). A fresh hosted project defaults to
# site_url=http://localhost:3000 with an empty redirect allow-list, which
# silently breaks email confirmation links (they verify server-side, then
# redirect to a localhost URL that doesn't load for the user). Set this to
# your real deployed URL after creating a new project.
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[functions.run-predictions]
verify_jwt = true

[functions.calculate-cost-optimization]
verify_jwt = true

[functions.seed-sample-data]
# Was `false` (fully public + used the service-role key -- anyone could call
# this with no auth at all). Now requires a valid JWT; the function itself
# additionally checks for admin/inventory_manager role and is idempotent.
verify_jwt = true

[functions.validate-password]
verify_jwt = true

[functions.secure-sign-in]
# Called pre-login; the anon key still satisfies verify_jwt (it's a valid,
# signed JWT), so this does not weaken the gateway-level check.
verify_jwt = true