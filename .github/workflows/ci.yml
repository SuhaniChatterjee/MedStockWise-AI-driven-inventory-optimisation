name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  ml:
    name: ML pipeline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r ml/requirements.txt
      - name: Run ML pipeline tests (no-leakage / reproducibility checks)
        run: python3 -m pytest ml/ -v

  prediction-api:
    name: Prediction API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r services/prediction-api/requirements.txt pytest
      - name: Run serving tests (seasonal multiplier logic)
        run: python3 -m pytest services/prediction-api/ -v
